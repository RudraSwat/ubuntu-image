on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'pull_request' }}
    continue-on-error: true
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        ubuntu_release: [noble, questing, rolling]
        desktop: [nogui, gnome, plasma]
    steps:
      - name: Checkout Push to Registry action
        uses: actions/checkout@v4

      - name: Generate image name
        run: |
          REPO_OWNER_LOWERCASE="$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')"
          echo "REPO_OWNER_LOWERCASE=$REPO_OWNER_LOWERCASE" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=ghcr.io/$REPO_OWNER_LOWERCASE/ubuntu-${{ matrix.ubuntu_release }}-${{ matrix.desktop }}" >> "$GITHUB_ENV"

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Package Registry
        uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push the Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}
          cache-to: type=inline,mode=min
          platforms: linux/amd64
          build-args: |
            UBUNTU_RELEASE=${{ matrix.ubuntu_release }}
            DESKTOP=${{ matrix.desktop }}
          provenance: false
